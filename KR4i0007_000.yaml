body:
  text: 續詩話詩文評類提要臣等謹案續詩話一巻宋司馬光續六一詩話而作傳家集未載惟見百川學海毛晉津逮秘書亦錄之前有光自作小引光徳行功業冠絶一時非斤斤於詞章之末者而品第諸詩乃極精宻如林逋之疎影横斜水清淺暗香浮動月黄昏魏野之數聲離岸櫓幾㸃别州山韓琦之花去曉叢蜂蝶亂雨餘春圃桔槔閒耿仙芝之草色引開盤馬地簫聲吹暖賣餳天冦準之江南春詩陳堯佐之吳江詩暢當王之渙之鸛雀樓詩及其父池行色詩相沿傳誦皆自光始表出之其論魏野詩誤改葯字及説杜甫國破山河在一首尤妙中理解非他詩話所及惟梅堯臣病死一條與詩無渉乃載之此書殊不可解者光别有涑水紀聞皆記當時士大夫逸事或兩書並修一時誤錄入此冊中亦未可定也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f80561342b31d929bb43aedb218554be501bacb1396714c082781ab9f4dbbca6
