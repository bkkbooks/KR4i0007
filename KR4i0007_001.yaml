  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0007_WYG_001-1a, image: WYG1478/WYG1478-0258c.png}
body:
  text: 續詩話宋司馬光撰詩話尚有遺者歐陽公文章名聲雖不可及然記事一也故敢續書之文德殿百官常朝之所也宰相奏事畢乃來押班常至日旰守堂卒好以厚朴湯飲朝士朝士有久無差遣厭苦常朝者戲為詩曰立殘階下梧桐影喫盡街頭厚朴湯亦朝中之實事也惠崇詩有劍靜龍歸匣旗間虎繞竿其尤自負者有河分岡勢斷春入燒痕青時人或有譏其犯古者嘲之河分岡勢司空曙春入燒痕劉長卿不是師兄多犯古古人詩句犯師兄進士潘閬常謔之曰崇師爾當憂獄事吾去夜夢爾拜我爾豈當歸俗耶惠崇曰此乃秀才憂獄事爾惠崇沙門也惠崇拜沙門倒也秀才得無詣沙門島耶梅聖俞之卒也余與宋子才選韓欽聖宗彥沈文通遘俱為三司僚屬共痛惜之子才曰比見聖俞面光澤特甚意為充盛不知乃為不祥也時欽聖面亦光澤文通指之曰次至欽聖矣衆皆尤其暴謔不數日欽聖抱疾而卒余謂文通曰君雖不為呪詛亦戲殺耳此雖無預時事然以其與聖俞同時事又相類故附之鄭工部詩有杜曲花香醲似酒灞陵春色老於人亦為時人所傳誦誠難得之句也科場程試詩國初以來難得佳者天聖中梓州進士楊諤始以詩著其天聖八年省試蒲車詩云草不驚皇轍山能護帝輿是嵗以䇿用清問字下第景祐元年省試宣室受釐詩云願前明主席一問洛陽人諤是年及第未幾卒慶厯二年韓欽聖試勳門賜立戟詩云凝峰畫幡轉交鍛彩支繁范景仁云曾見真本如此傳欽聖作迎風畫幡轉映日彩支繁故兩存之蘇州進士丁偃試邇英延講藝詩云白虎前芳掩金華舊事輕天心非不寤垂意在蒼生有古詩諷諫之體偃是嵗奏名甚髙御前下第自是二十年始及第尋卒滕元發甫皇祐五年御試律聽軍聲詩云萬國休兵外羣生奏凱中以是得第三人最為場屋所稱鮑當善為詩景德二年進士及第為河南府法曹薛尚書映知府當失其意初甚怒之當獻孤雁詩云天寒稻梁少萬里孤難進不惜充君庖為帶邊城信薛大嗟賞自是遊宴無不預焉不復以掾屬待之時人謂之鮑孤雁薛嘗暑月詣其廨舍當方露頂狼狽入易服把板而出忘其幞頭薛嚴重左右莫敢言者坐久之月上當顧見髮影大慙以公服袖掩頭而走林逋處士錢塘人家於西湖之上有詩名人稱其梅花詩云疏影橫斜水清淺暗香浮動月黃昏曲盡梅之體態魏野處士陜人字仲先少時未知名嘗題河上寺柱云數聲離岸櫓幾點别州山時有幕僚本江南文士也見之大驚邀與相見贈詩曰怪得名稱野元來性不羣借冠來謁我倒屣起迎君仍為延譽由是人始重之其詩效白樂天體真宗西祀聞其名遣中使召之野閉戶踰垣而遁王太尉相旦從車駕過陜野貽詩曰昔時宰相年年替君在中書十一秋西祀東封俱已了如今好逐赤松逰王袖其詩以呈上纍表請退上不許野又嘗上寇萊公準詩云好去上天辭將相却來平地作神仙又有啄朩鳥詩云千林蠧如盡一腹餧何妨又竹杯挍詩云吉凶終在我反覆謾勞君有詩人規戒之風卒贈著作郎仍詔子孫租稅外其餘科役皆無所預仲先詩有妻喜栽花活童誇鬬草贏真得野人之趣以其皆非急務也仲先詩有燒葉爐中無宿火讀書窗下有殘燈仲先既沒集其詩者嫌燒葉貧寒太甚故改葉為藥不唯壞此一字乃并一句亦無氣味所謂求益反損也仲先贈先公詩有文雖如貌古道不似家貧先公監安豐酒稅赴官嘗有行色詩云冷於陂水淡於秋逺陌初窮見渡頭猶賴丹青無處畫畫成應遣一生愁豈非狀難寫之景也丁相謂善為詩在珠崖猶有詩近百篇號知命集其警句有草解忘憂憂底事花能含笑笑何人少時好蹴踘長韻其二聯云鷹鶻騰雙眼龍蛇繞四肢躡來行數步蹺後立多時寇萊公詩才思融逺年十九進士及第初知巴東縣有詩云野水無人渡孤舟盡日橫又嘗為江南春云波渺渺柳依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸為人膾炙陳文惠公堯佐能為詩世稱其吳江詩云平波渺渺煙蒼蒼菰蒲才熟楊栁黃扁舟繫岸不忍去秋風斜日鱸魚香又嘗有詩云雨網蛛絲斷風枝鳥夢搖詩家零落景采石合如樵龎頴公籍喜為詩雖臨邊典藩文案委積日不廢三兩篇以此為適及疾亟余時為諌官以十餘篇相示手批其後曰欲令吾弟知老夫病中嘗有此思耳字已慘淡難識後數日而薨韓退處士絳州人放誕不拘浪迹秦晉間以詩自名嘗跨一白驢自有詩云山下跨雪精上便不論程嗅地打不動笑天休始行為人所稱好著寬袖鶴􅗓醉則鶴舞石曼卿贈詩曰醉狂玄鶴舞間卧白驢號章獻大后上仙羣臣進挽歌數百首唯曼卿一聯首出曰震出坤柔變乾成太極虛太后稱制日仁宗端拱至是始親萬機曼卿詩切合時宜又不卑長樂也李長吉歌天若有情天亦老人以為竒絶無對曼卿對月如無恨月長圓人以為勍敵詩云牂羊墳首三星在罶言不可久古人為詩貴於意在言外使人思而得之故言之者無罪聞之者足以戒也近世詩人唯杜子美最得詩人之體如國破山河在城春草朩深感時花濺淚恨别鳥驚心山河在明無餘物矣草朩深明無人矣花鳥平時可娛之物見之而泣聞之而悲則時可知矣他皆類此不可遍舉劉槩字孟節青州人喜為詩慷慨有氣節舉進士及第為幕僚一任不得志棄官隱居野原山去人境四十里好逰山常獨挈飯一罌窮探幽險無所不至夜則宿於巖石之下或纍日乃返不畏虎豹蛇虺富丞相甚禮重之常在府舍西軒有詩云昔年曾作瀟湘客憔悴東秦歸未得西軒忽見好溪山如何尚有楚鄉憶讀書誤人四十年有時醉把闌干拍唐之中葉文章特盛其姓名湮沒不傳於世者甚衆如河中府鸛省樓有王之美暢諸一云暢當二詩暢詩曰逈臨飛鳥上髙謝世人間天勢圍平野河流入斷山王詩曰白日依山盡黃河入海流欲窮千里目更上一層樓二人者皆當時賢士所不數如後人擅詩名者豈能及之哉陳亞郎中性滑稽嘗為藥名詩百首其美者有風雨前湖夜軒窗半夏涼不失詩家之體其鄙者有贈乞雨自曝僧云不雨若令過半夏定應晒作胡蘆巴又詠上元夜遊人云但看車前牛領上十家皮沒五家皮蔡君謨嘗嘲之曰陳亞有心終是惡亞應聲曰蔡襄除口便成襄楊朴字契玄鄭州人善為詩不仕少時嘗與畢相同學畢薦之太宗召見面賦蓑衣詩云狂脫酒家春醉後亂堆漁舍晚晴時除官不受聽歸山以其子從政為長水尉朴嘗為七夕詩云年年乞與人間巧不道人間巧已多劉子儀與夏英公同在翰林子儀素為先逹章獻臨朝時子儀主文在貢院聞英公為樞密副使意頗不平作堠子詩云空呈厚貌臨官道大有人從捷徑過先朝春月多召兩府兩制三館於後苑賞花釣魚賦詩自趙元昊背誕西郵用兵廢缺甚久嘉祐末仁宗始復修故事羣臣和御製詩是日微隂寒韓魏公時為首相詩卒章云輕雲閣雨迎天仗寒色留春入夀杯二十年前曾侍宴台司今日喜重陪時內侍都知任守忠嘗以滑稽侍上從容言曰韓琦詩譏陛下上愕然問其故守忠曰譏陛下逰宴太頻上為之笑熙寧初魏公罷相留守北京新進多陵慢之魏公鬱鬱不得志嘗為詩云花去曉叢蜂蝶亂雨勻春圃桔橰間時人稱其微婉元豐初宦者王紳效王建作宫詞百首獻之頗有意思其太皇太后生日詩云太皇生日最尊榮獻夀宫中未五更天子捧觴仍再拜寶慈侍立到天明寶慈皇太后宫名也太后幸景靈宫駕前露面雙童女詩曰平明彩仗幸琳宫紫府仙童下九重整頓瓏璁時駐馬畫工暗地貌真容歐陽公云九僧詩集已亡元豐元年秋余遊萬安山玉泉寺于進士閔交如舍得之所謂九詩僧者劔南希晝金華保暹南越文兆天台行肇沃州簡長貴城惟鳯淮南惠崇江南宇昭峩眉懷古也直昭文館陳充集而序之其美者亦止於世人所稱數聯耳交如好治經所為竒僻自謂得聖人微旨先儒所不能到貧無妻兒不應舉常寄食僧舍僧亦不厭苦之始居龍門山猶苦遊人往來多徙居萬安山屛絶人事專以治經為事凡數十年用心益苦而去人情益逺衆非笑之交如不變益堅雖非中行其志亦可憐也范景仁鎮喜為詩年六十三致仕一朝思鄉里遂徑行入蜀故人李才元大臨知梓州景仁枉道過之歸至成都日與鄉人樂飲散財於親舊之貧者遂遊峨眉青城山下巫峽出荆門凡期嵗乃還京師在道作詩凡二百五篇其一聯云不學鄉人誇駟馬未饒吾祖泛扁舟此二事他人所不能用也嘉祐中有劉諷都官蕑州人亦年六十三致仕夫婦徙居賴山景仁有詩送之云移家尚恐青山賤隱几惟知白日長時有朱公綽送諷詩云疏草焚來應見史槖金散盡只留書皆為時人所傳誦大名進士耿仙芝詩著其一聯云淺水短蕪調馬地淡雲微雨養花天為人所稱唐明皇以諸王從學命集賢院學士徐堅等討集故事兼前世文辭撰初學記劉中山子儀愛其書曰非止初學可為終身記宗袞嘗曰殘人矜才逆詐恃明吾終身不為也猶唐相崔渙曰抑人以逺謗吾所不為杜甫終於耒陽藁葬之至元和中其孫始改葬於鞏縣元微之為志而鄭刑部文寶謫官衡州有經耒陽子美墓詩豈但為志而不克遷或已遷而故塜尚存耶北都使宅舊有過馬廳按唐韓渥詩云外使進鷹初得按中官過馬不教嘶注云乘馬必中官馭以進謂之過馬既乘之然後蹀躞嘶鳴也蓋唐時方鎮亦俲之因而名廳事也續詩話
